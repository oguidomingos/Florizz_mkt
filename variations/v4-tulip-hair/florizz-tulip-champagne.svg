    C 196 278, 202 295, 205 315
    C 210 345, 188 365, 184 388
    C 180 412, 204 435, 208 458
    C 213 482, 190 502, 188 528
    C 186 548, 196 558, 200 572
  " stroke="#F4EDE0" fill="none" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Third hair strand (finest) -->
  <path d="
    M 203 262
    C 205 280, 215 295, 218 312
    C 222 340, 200 358, 196 382
    C 192 408, 216 428, 220 452
    C 225 478, 200 498, 197 522
    C 194 542, 204 555, 208 568

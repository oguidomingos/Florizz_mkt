      .stem { stroke: #F4EDE0; fill: none; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Center petal (tallest) -->
  <path class="petal" d="
    M 200 30
    C 170 30, 145 80, 140 130
    C 135 175, 145 210, 165 235
    C 175 248, 188 255, 200 258
    C 212 255, 225 248, 235 235
    C 255 210, 265 175, 260 130
    C 255 80, 230 30, 200 30
    Z
  "/>

  <!-- Left petal -->
  <path class="petal" d="
    M 175 70
    C 150 65, 115 85, 100 120
